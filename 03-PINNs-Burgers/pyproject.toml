[project]
name = "03-PINNs-Burgers"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "scipy>=1.17.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/03_PINNs_Burgers"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[project.optional-dependencies]
dev = [
  "pytest",
  "pytest-cov",
]
